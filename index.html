<!DOCTYPE html>
<html>
<head>
  <title>Pathfinder NLP Engine</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 40px;
    }
    textarea, select {
      width: 80%;
      margin: 10px;
      padding: 10px;
    }
    button {
      padding: 10px 20px;
      background: #22c55e;
      border: none;
      color: black;
      font-weight: bold;
      cursor: pointer;
      margin: 5px;
    }
    .output {
      margin-top: 20px;
      padding: 20px;
      background: #1e293b;
    }
    .saved-box {
      margin: 10px;
      padding: 10px;
      background: #334155;
    }
  </style>
</head>
<body>

  <h1>🧠 Pathfinder NLP Engine</h1>

  <select id="type">
    <option value="smoking">Stop Smoking</option>
    <option value="confidence">Confidence</option>
    <option value="anxiety">Anxiety Relief</option>
    <option value="motivation">Motivation</option>
  </select><br>

  <textarea id="input" placeholder="Describe your situation..."></textarea><br>

  <button onclick="generate()">Generate Script</button>
  <button onclick="clearScripts()">Clear Saved</button>

  <div class="output" id="output"></div>
  <div id="saved"></div>

  <script>
    function generate() {
      const input = document.getElementById("input").value;
      const type = document.getElementById("type").value;

      let script = "";

      if (type === "smoking") {
        script = `You are now releasing the habit of smoking. The craving fades. You feel clean, strong, and free. ${input}`;
      } else if (type === "confidence") {
        script = `Confidence rises within you. You trust yourself fully. You walk, speak, and act with certainty. ${input}`;
      } else if (type === "anxiety") {
        script = `Your body relaxes deeply. Calm flows through you. You are safe, grounded, and in control. ${input}`;
      } else if (type === "motivation") {
        script = `Energy builds inside you. You take action with clarity and purpose. You move forward now. ${input}`;
      }

      document.getElementById("output").innerText = script;

      saveScript(script);
    }

    function saveScript(script) {
      let scripts = JSON.parse(localStorage.getItem("scripts")) || [];
      scripts.push(script);
      localStorage.setItem("scripts", JSON.stringify(scripts));
      displayScripts();
    }

    function displayScripts() {
      let scripts = JSON.parse(localStorage.getItem("scripts")) || [];
      let html = "<h2>Saved Scripts</h2>";

      scripts.forEach((s) => {
        html += `<div class="saved-box">${s}</div>`;
      });

      document.getElementById("saved").innerHTML = html;
    }

    function clearScripts() {
      localStorage.removeItem("scripts");
      displayScripts();
    }

    window.onload = displayScripts;
  </script>

</body>
</html>
