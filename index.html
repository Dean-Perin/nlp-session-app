<script>

function generate() {
  const input = document.getElementById("input").value;
  const type = document.getElementById("type").value;

  let script = "";

  if (type === "smoking") {
    script = `You are now releasing the habit of smoking. The craving fades. You feel clean, strong, and free. ${input}`;
  } else if (type === "confidence") {
    script = `Confidence rises within you. You trust yourself fully. You walk, speak, and act with certainty. ${input}`;
  } else if (type === "anxiety") {
    script = `Your body relaxes deeply. Calm flows through you. You are safe, grounded, and in control. ${input}`;
  } else if (type === "motivation") {
    script = `Energy builds inside you. You take action with clarity and purpose. You move forward now. ${input}`;
  }

  document.getElementById("output").innerText = script;

  saveScript(script);
}

function saveScript(script) {
  let scripts = JSON.parse(localStorage.getItem("scripts")) || [];
  scripts.push(script);
  localStorage.setItem("scripts", JSON.stringify(scripts));
  displayScripts();
}

function displayScripts() {
  let scripts = JSON.parse(localStorage.getItem("scripts")) || [];
  let html = "<h2>Saved Scripts</h2>";

  scripts.forEach((s) => {
    html += `<div class="saved-box">${s}</div>`;
  });

  document.getElementById("saved").innerHTML = html;
}

function clearScripts() {
  localStorage.removeItem("scripts");
  displayScripts();
}

/* 🔥 YOUR DOWNLOAD FUNCTION */
function download() {
  const text = document.getElementById("output").innerText;

  const blob = new Blob([text], { type: "text/plain" });
  const link = document.createElement("a");

  link.href = URL.createObjectURL(blob);
  link.download = "nlp-script.txt";

  link.click();
}

window.onload = displayScripts;

<button onclick="download()">Download Script</button>

git commit -m "fixed download + full script block"

</script>
